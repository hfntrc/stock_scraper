name: Daily Stock Scraper

on:
  schedule:
    - cron: '15 0 * * *' # 每天台灣時間 08:15 執行
  workflow_dispatch: # 保持手動執行功能

permissions:
  contents: write

jobs:
  daily_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright  # 確保有安裝 playwright 套件

      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
          playwright install chromium --with-deps

      - name: Run Daily Scrapers
        run: |
          # python scrape_histock.py
          python scrape_wantgoo.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p data
          git add data/*.json
          git commit -m "Daily Update" || exit 0
          git push
